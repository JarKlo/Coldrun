name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-metadata:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title and description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = (pr.title || '').trim();
            const body = (pr.body || '').trim();

            const errors = [];

            if (title.length < 10) {
              errors.push('PR title must be at least 10 characters long.');
            }

            const requiredSections = ['## Summary', '## Validation', '## Safety'];
            for (const section of requiredSections) {
              if (!body.includes(section)) {
                errors.push(`PR body is missing required section: ${section}`);
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
              return;
            }

            core.info('PR metadata validation passed.');
