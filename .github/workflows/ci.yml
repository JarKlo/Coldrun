name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect repository stacks
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          has_dotnet=false
          has_node=false
          has_python=false

          if find . -type f \( -name "*.sln" -o -name "*.csproj" \) | grep -q .; then
            has_dotnet=true
          fi

          if [ -f package.json ]; then
            has_node=true
          fi

          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            has_python=true
          fi

          echo "has_dotnet=${has_dotnet}" >> "$GITHUB_OUTPUT"
          echo "has_node=${has_node}" >> "$GITHUB_OUTPUT"
          echo "has_python=${has_python}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        if: steps.detect.outputs.has_dotnet == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build and test .NET
        if: steps.detect.outputs.has_dotnet == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t solutions < <(find . -type f -name "*.sln")
          mapfile -t projects < <(find . -type f -name "*.csproj")

          if [ "${#solutions[@]}" -gt 0 ]; then
            for sln in "${solutions[@]}"; do
              dotnet restore "$sln"
              dotnet build "$sln" --configuration Release --no-restore
            done
          elif [ "${#projects[@]}" -gt 0 ]; then
            for csproj in "${projects[@]}"; do
              dotnet restore "$csproj"
              dotnet build "$csproj" --configuration Release --no-restore
            done
          fi

          mapfile -t test_projects < <(find . -type f -name "*Test*.csproj" -o -name "*Tests*.csproj")
          if [ "${#test_projects[@]}" -gt 0 ]; then
            for test_proj in "${test_projects[@]}"; do
              dotnet test "$test_proj" --configuration Release --no-build --verbosity normal
            done
          else
            echo "No .NET test projects detected."
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build and test Node.js
        if: steps.detect.outputs.has_node == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build --if-present
          npm test --if-present

      - name: Setup Python
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build and test Python
        if: steps.detect.outputs.has_python == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f pyproject.toml ]; then
            pip install .
          fi
          if [ -d tests ] || find . -type f -name "test_*.py" | grep -q .; then
            pip install pytest
            pytest -q
          else
            echo "No Python tests detected."
          fi

      - name: No stack detected
        if: steps.detect.outputs.has_dotnet != 'true' && steps.detect.outputs.has_node != 'true' && steps.detect.outputs.has_python != 'true'
        run: echo "No .NET, Node.js, or Python project files detected yet. CI is configured and ready for future code."
